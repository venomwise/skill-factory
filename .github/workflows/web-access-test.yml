name: Test web-access

on:
  pull_request:
    paths:
      - 'web-access/**'
      - 'web-access-go/**'
      - '.github/workflows/web-access-test.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: web-access-go/go.sum

      - name: Download dependencies
        working-directory: web-access-go
        run: go mod download

      - name: Run tests
        working-directory: web-access-go
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check code formatting
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        working-directory: web-access-go
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        working-directory: web-access-go
        run: go vet ./...

      - name: Build binary
        working-directory: web-access-go
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BINARY="web-access.exe"
          else
            BINARY="web-access"
          fi
          go build -o "$BINARY" cmd/web-access/main.go
          ./$BINARY version

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        uses: codecov/codecov-action@v4
        with:
          files: ./web-access-go/coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: web-access-go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: web-access-go
          args: --timeout=5m
        continue-on-error: true
