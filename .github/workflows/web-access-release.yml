name: Build and Release web-access

on:
  push:
    tags:
      - 'web-access-v*'

permissions:
  contents: write

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: web-access-go/go.sum

      - name: Run tests
        working-directory: web-access-go
        run: go test -v ./...

      - name: Build and verify
        working-directory: web-access-go
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BINARY="web-access.exe"
          else
            BINARY="web-access"
          fi
          go build -o "$BINARY" cmd/web-access/main.go
          ./$BINARY version

  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64

          # macOS
          - os: darwin
            arch: amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64

          # Windows
          - os: windows
            arch: amd64
            runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: web-access-go/go.sum

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/web-access-}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GO_VERSION=$(go version | awk '{print $3}')

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "go_version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        working-directory: web-access-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="web-access"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="web-access.exe"
          fi

          go build -trimpath -ldflags "\
            -s -w \
            -X main.version=${{ steps.version.outputs.version }} \
            -X main.commit=${{ steps.version.outputs.commit }} \
            -X main.date=${{ steps.version.outputs.date }} \
            -X main.goVersion=${{ steps.version.outputs.go_version }}" \
            -o "${BINARY_NAME}" \
            cmd/web-access/main.go

          # Verify the binary
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x "${BINARY_NAME}"
            file "${BINARY_NAME}"
          fi

      - name: Create archive
        shell: bash
        working-directory: web-access-go
        run: |
          ARCHIVE_NAME="web-access-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "${ARCHIVE_NAME}.zip" web-access.exe
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" web-access
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Generate checksum
        shell: bash
        working-directory: web-access-go
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            sha256sum "${ARCHIVE_FILE}" > "${ARCHIVE_FILE}.sha256"
          else
            shasum -a 256 "${ARCHIVE_FILE}" > "${ARCHIVE_FILE}.sha256"
          fi
          cat "${ARCHIVE_FILE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-access-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            web-access-go/${{ env.ARCHIVE_FILE }}
            web-access-go/${{ env.ARCHIVE_FILE }}.sha256
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/web-access-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate release notes
        id: notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Web Access ${{ steps.version.outputs.version }}

          Unified web access CLI tool powered by Exa and Grok APIs.

          ### Features
          - 🔍 Source-first search: docs, search, extract, similar (Exa)
          - 🌐 Live synthesis: news, social, research, docs-compare (Grok)
          - 🔄 Multi-profile failover with automatic retry
          - ⚙️ Unified configuration: TOML files, environment variables, CLI flags
          - 📊 Multiple output formats: JSON, plain text, URLs-only
          - 🚀 Zero dependencies: statically compiled binary

          ### Installation

          Download the appropriate binary for your platform:

          **Linux (x86_64)**
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/web-access-${{ steps.version.outputs.version }}/web-access-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
          tar xzf web-access-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
          sudo mv web-access /usr/local/bin/
          ```

          **Linux (ARM64)**
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/web-access-${{ steps.version.outputs.version }}/web-access-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
          tar xzf web-access-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
          sudo mv web-access /usr/local/bin/
          ```

          **macOS (Intel)**
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/web-access-${{ steps.version.outputs.version }}/web-access-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
          tar xzf web-access-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
          sudo mv web-access /usr/local/bin/
          ```

          **macOS (Apple Silicon)**
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/web-access-${{ steps.version.outputs.version }}/web-access-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
          tar xzf web-access-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
          sudo mv web-access /usr/local/bin/
          ```

          **Windows (x86_64)**

          Download `web-access-${{ steps.version.outputs.version }}-windows-amd64.zip` and extract to a directory in your PATH.

          ### Configuration

          Create `~/.config/ai-skills/web-access.toml`:

          ```toml
          [exa]
          [[exa.profiles]]
          id = "main"
          api_key = "YOUR_EXA_API_KEY"

          [grok]
          [[grok.profiles]]
          id = "main"
          api_key = "YOUR_GROK_API_KEY"
          ```

          Or use environment variables:
          ```bash
          export EXA_API_KEY="your-exa-key-here"
          export GROK_API_KEY="your-grok-key-here"
          ```

          ### Verification

          Verify the download with SHA256 checksums:
          ```bash
          sha256sum -c web-access-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
          ```

          Check version:
          ```bash
          web-access version
          ```

          ### Documentation

          - [SKILL.md](https://github.com/${{ github.repository }}/blob/main/web-access/SKILL.md)
          - [Configuration Guide](https://github.com/${{ github.repository }}/blob/main/web-access/references/configuration.md)
          - [Query Recipes](https://github.com/${{ github.repository }}/blob/main/web-access/references/query-recipes.md)

          ### Checksums

          All binaries include SHA256 checksums for verification.
          EOF
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: web-access-${{ steps.version.outputs.version }}
          name: Web Access ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
