name: Update db-explorer Skill Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string
  workflow_run:
    workflows: ["Build and Release db-explorer"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-skill:
    name: Update skill binaries
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: db-explorer-go/go.mod
          cache-dependency-path: db-explorer-go/go.sum

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 --match 'db-explorer-v*' | sed 's/db-explorer-//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Create bin directory
        shell: bash
        run: |
          mkdir -p db-explorer/bin
          rm -f db-explorer/bin/db-explorer-*

      - name: Build all platforms
        working-directory: db-explorer-go
        shell: bash
        env:
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GO_VERSION=$(go version | awk '{print $3}')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE} -X main.goVersion=${GO_VERSION}"

          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../db-explorer/bin/db-explorer-linux-amd64 \
            ./cmd/db-explorer

          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../db-explorer/bin/db-explorer-linux-arm64 \
            ./cmd/db-explorer

          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../db-explorer/bin/db-explorer-darwin-amd64 \
            ./cmd/db-explorer

          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../db-explorer/bin/db-explorer-darwin-arm64 \
            ./cmd/db-explorer

          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../db-explorer/bin/db-explorer-windows-amd64.exe \
            ./cmd/db-explorer

      - name: Set executable permissions
        shell: bash
        run: |
          chmod +x db-explorer/bin/db-explorer-* || true
          ls -lh db-explorer/bin/

      - name: Generate checksums
        working-directory: db-explorer/bin
        shell: bash
        run: |
          sha256sum db-explorer-* > SHA256SUMS
          cat SHA256SUMS

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db-explorer/bin/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(db-explorer): update binaries to ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Summary
        shell: bash
        run: |
          echo "## db-explorer Skill Binaries Updated ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Binaries" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          ls -lh db-explorer/bin/ >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          cat db-explorer/bin/SHA256SUMS >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
