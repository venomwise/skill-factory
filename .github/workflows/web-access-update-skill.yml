name: Update web-access Skill Binaries

on:
  workflow_run:
    workflows: ["Build and Release web-access"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-skill:
    name: Update skill binaries
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: web-access-go/go.sum

      - name: Get version
        id: version
        run: |
          # Get the latest tag
          VERSION=$(git describe --tags --abbrev=0 | sed 's/web-access-//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create bin directory
        run: |
          mkdir -p web-access/bin
          rm -f web-access/bin/web-access-*

      - name: Build all platforms
        working-directory: web-access-go
        env:
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GO_VERSION=$(go version | awk '{print $3}')

          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE} -X main.goVersion=${GO_VERSION}"

          # Linux amd64
          echo "Building linux-amd64..."
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../web-access/bin/web-access-linux-amd64 \
            cmd/web-access/main.go

          # Linux arm64
          echo "Building linux-arm64..."
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../web-access/bin/web-access-linux-arm64 \
            cmd/web-access/main.go

          # macOS amd64
          echo "Building darwin-amd64..."
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../web-access/bin/web-access-darwin-amd64 \
            cmd/web-access/main.go

          # macOS arm64
          echo "Building darwin-arm64..."
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../web-access/bin/web-access-darwin-arm64 \
            cmd/web-access/main.go

          # Windows amd64
          echo "Building windows-amd64..."
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" \
            -o ../web-access/bin/web-access-windows-amd64.exe \
            cmd/web-access/main.go

      - name: Set executable permissions
        run: |
          chmod +x web-access/bin/web-access-*
          ls -lh web-access/bin/

      - name: Generate checksums
        working-directory: web-access/bin
        run: |
          sha256sum web-access-* > SHA256SUMS
          cat SHA256SUMS

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add web-access/bin/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(web-access): update binaries to ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Summary
        run: |
          echo "## Skill Binaries Updated ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Binaries" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh web-access/bin/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checksums" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat web-access/bin/SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
