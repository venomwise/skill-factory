name: Test grok-search

on:
  push:
    tags:
      - 'grok-search-v*'
  pull_request:
    paths:
      - 'grok-search-go/**'
      - '.github/workflows/grok-search-test.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: grok-search-go/go.mod
          cache-dependency-path: grok-search-go/go.sum

      - name: Download dependencies
        working-directory: grok-search-go
        run: go mod download

      - name: Run tests
        working-directory: grok-search-go
        shell: bash
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check code formatting
        if: matrix.os == 'ubuntu-latest'
        working-directory: grok-search-go
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        working-directory: grok-search-go
        run: go vet ./...

      - name: Build binary
        working-directory: grok-search-go
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BINARY="grok-search.exe"
          else
            BINARY="grok-search"
          fi
          go build -o "$BINARY" ./cmd/grok-search
          ./$BINARY version

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./grok-search-go/coverage.out
          flags: grok-search
          name: grok-search-coverage
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: grok-search-go/go.mod
          cache-dependency-path: grok-search-go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: grok-search-go
          args: --timeout=5m
        continue-on-error: true
