name: Test exa-search

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'exa-search-go/**'
      - '.github/workflows/exa-search-test.yml'
  pull_request:
    paths:
      - 'exa-search-go/**'
      - '.github/workflows/exa-search-test.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22', '1.23']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: exa-search-go/go.sum

      - name: Download dependencies
        working-directory: exa-search-go
        run: go mod download

      - name: Run tests
        working-directory: exa-search-go
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check code formatting
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        working-directory: exa-search-go
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        working-directory: exa-search-go
        run: go vet ./...

      - name: Build binary
        working-directory: exa-search-go
        shell: bash
        run: |
          go build -o exa-search cmd/exa-search/main.go
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./exa-search.exe version
          else
            ./exa-search version
          fi

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        uses: codecov/codecov-action@v4
        with:
          files: ./exa-search-go/coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: exa-search-go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: exa-search-go
          args: --timeout=5m
        continue-on-error: true
